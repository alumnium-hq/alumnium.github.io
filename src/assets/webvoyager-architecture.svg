<svg viewBox="0 0 400 660" width="100%" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect width="400" height="660" rx="8" fill="#ffffff"/>

  <!-- Box 1: Claude Code -->
  <rect x="10" y="10" width="380" height="120" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="200" y="63" text-anchor="middle" font-size="28" font-weight="700" fill="#1e40af">Claude Code</text>
  <rect x="115" y="76" width="170" height="36" rx="18" fill="#dbeafe"/>
  <text x="200" y="100" text-anchor="middle" font-size="15" fill="#1e40af">Frontier Model</text>

  <!-- Down arrow: Claude Code → Alumnium MCP -->
  <line x1="30" y1="130" x2="30" y2="272" stroke="#374151" stroke-width="1.5"/>
  <polygon points="24,272 36,272 30,280" fill="#374151"/>
  <!-- Outgoing labels (upper portion of gap) -->
  <text x="48" y="160" text-anchor="start" font-size="13" fill="#374151">do("filter by 4 stars &amp; up")</text>
  <text x="48" y="178" text-anchor="start" font-size="13" fill="#374151">get("top 3 product names")</text>

  <!-- Up arrow: Alumnium MCP → Claude Code -->
  <line x1="370" y1="280" x2="370" y2="138" stroke="#9ca3af" stroke-width="1.5"/>
  <polygon points="364,138 376,138 370,130" fill="#9ca3af"/>
  <!-- Incoming labels (lower portion of gap) -->
  <text x="352" y="220" text-anchor="end" font-size="13" fill="#6b7280">"Clicked '4&#9733; &amp; Up'. 939 results."</text>
  <text x="352" y="238" text-anchor="end" font-size="13" fill="#6b7280">["Xbox Velocity Green"]</text>

  <!-- Box 2: Alumnium MCP -->
  <rect x="10" y="280" width="380" height="120" rx="8" fill="#0278ff"/>
  <text x="200" y="333" text-anchor="middle" font-size="28" font-weight="700" fill="#ffffff">Alumnium MCP</text>
  <rect x="115" y="346" width="170" height="36" rx="18" fill="#0060f9"/>
  <text x="200" y="370" text-anchor="middle" font-size="15" fill="#ffffff">Low-tier Model</text>

  <!-- Down arrow: Alumnium MCP → Selenium -->
  <line x1="30" y1="400" x2="30" y2="522" stroke="#374151" stroke-width="1.5"/>
  <polygon points="24,522 36,522 30,530" fill="#374151"/>
  <!-- Outgoing label -->
  <text x="48" y="447" text-anchor="start" font-size="13" fill="#374151">click(element_id=387)</text>

  <!-- Up arrow: Selenium → Alumnium MCP -->
  <line x1="370" y1="530" x2="370" y2="408" stroke="#9ca3af" stroke-width="1.5"/>
  <polygon points="364,408 376,408 370,400" fill="#9ca3af"/>
  <!-- Incoming label -->
  <text x="352" y="480" text-anchor="end" font-size="13" fill="#6b7280">[{role:"link", name:"4 Stars &amp; Up"}]</text>

  <!-- Box 3: Selenium -->
  <rect x="10" y="530" width="380" height="120" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="200" y="583" text-anchor="middle" font-size="28" font-weight="700" fill="#374151">Selenium</text>
  <rect x="150" y="596" width="100" height="36" rx="18" fill="#e5e7eb"/>
  <text x="200" y="620" text-anchor="middle" font-size="15" fill="#374151">Chrome</text>
</svg>
