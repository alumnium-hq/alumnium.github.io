<svg viewBox="0 0 420 342" width="100%" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
  <!-- Background -->
  <rect width="420" height="342" rx="8" fill="#ffffff"/>

  <!-- Horizontal grid lines (80%=y290, 85%=y223, 90%=y155, 95%=y88, 100%=y20) -->
  <line x1="50" y1="20"  x2="390" y2="20"  stroke="#e5e7eb" stroke-width="1"/>
  <line x1="50" y1="88"  x2="390" y2="88"  stroke="#e5e7eb" stroke-width="1"/>
  <line x1="50" y1="155" x2="390" y2="155" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="50" y1="223" x2="390" y2="223" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="50" y1="290" x2="390" y2="290" stroke="#d1d5db" stroke-width="1"/>

  <!-- Y-axis labels -->
  <text x="44" y="24"  text-anchor="end" font-size="11" fill="#9ca3af">100%</text>
  <text x="44" y="92"  text-anchor="end" font-size="11" fill="#9ca3af">95%</text>
  <text x="44" y="159" text-anchor="end" font-size="11" fill="#9ca3af">90%</text>
  <text x="44" y="227" text-anchor="end" font-size="11" fill="#9ca3af">85%</text>
  <text x="44" y="294" text-anchor="end" font-size="11" fill="#9ca3af">80%</text>

  <!-- Alumnium (98.5%): height=250, top=40 -->
  <rect x="60"  y="40"  width="50" height="250" rx="3" fill="#0278ff"/>
  <text x="85"  y="34"  text-anchor="middle" font-size="11" font-weight="700" fill="#0278ff">98.5%</text>

  <!-- Surfer 2 (97.1%): height=231, top=59 -->
  <rect x="127" y="59"  width="50" height="231" rx="3" fill="#94a3b8"/>
  <text x="152" y="53"  text-anchor="middle" font-size="11" fill="#6b7280">97.1%</text>

  <!-- Magnitude (93.9%): height=188, top=102 -->
  <rect x="194" y="102" width="50" height="188" rx="3" fill="#94a3b8"/>
  <text x="219" y="96"  text-anchor="middle" font-size="11" fill="#6b7280">93.9%</text>

  <!-- Browser Use (89.1%): height=123, top=167 -->
  <rect x="261" y="167" width="50" height="123" rx="3" fill="#94a3b8"/>
  <text x="286" y="161" text-anchor="middle" font-size="11" fill="#6b7280">89.1%</text>

  <!-- OpenAI Operator (87%): height=95, top=195 -->
  <rect x="328" y="195" width="50" height="95"  rx="3" fill="#94a3b8"/>
  <text x="353" y="189" text-anchor="middle" font-size="11" fill="#6b7280">87.0%</text>

  <!-- X-axis labels -->
  <text x="85"  y="318" text-anchor="middle" font-size="10" font-weight="600" fill="#111827">Alumnium</text>
  <text x="152" y="318" text-anchor="middle" font-size="10" fill="#374151">Surfer 2</text>
  <text x="219" y="318" text-anchor="middle" font-size="10" fill="#374151">Magnitude</text>
  <text x="286" y="318" text-anchor="middle" font-size="10" fill="#374151">Browser Use</text>
  <text x="353" y="318" text-anchor="middle" font-size="10" fill="#374151">Operator</text>
</svg>
